<!-- Authentication Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Speed.run</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Auth Page Styles */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 140px);
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border: 1px solid #e0e0e8;
            border-radius: 16px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.875rem;
            margin-bottom: 0.5rem;
            color: #1a1a2e;
        }

        .auth-header p {
            color: #6a6a80;
            font-size: 1rem;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: #9999aa;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e8;
        }

        .auth-divider span {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 1px solid #e0e0e8;
            border-radius: 8px;
            background: white;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .auth-btn:hover {
            background: #f8f9fa;
            border-color: #4b7fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(75, 127, 255, 0.2);
        }

        .auth-btn.discord {
            border-color: #5865f2;
            color: #5865f2;
        }

        .auth-btn.discord:hover {
            background: #f0f1ff;
            border-color: #4752c4;
        }

        .auth-btn.google {
            border-color: #ea4335;
            color: #ea4335;
        }

        .auth-btn.google:hover {
            background: #fff0f0;
            border-color: #c5221f;
        }

        .auth-icon {
            font-size: 1.25rem;
        }

        .auth-or {
            text-align: center;
            margin: 2rem 0;
        }

        .player-id-section {
            background: #f8f9fa;
            border: 1px solid #e0e0e8;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .player-id-section h3 {
            color: #1a1a2e;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .player-id-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e0e0e8;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .player-id-input:focus {
            border-color: #4b7fff;
        }

        .player-id-submit {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #4b7fff, #6a9fff);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .player-id-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(75, 127, 255, 0.3);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e8;
            color: #6a6a80;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #4b7fff;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-text">Speed<span class="logo-accent">.run</span></span>
            </div>
            
            <nav class="nav-menu">
                <a href="/" class="nav-link active">Home</a>
                <a href="/leaderboard" class="nav-link">Leaderboard</a>
            </nav>

            <div class="user-section"></div>
        </div>
    </header>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Sign In</h1>
                <p>Connect to Speed.run and track your stats</p>
            </div>

            <!-- OAuth Buttons -->
            <div class="auth-buttons">
                <button class="auth-btn discord" id="auth-discord">
                    <span class="auth-icon">💜</span>
                    <span>Continue with Discord</span>
                </button>
                <button class="auth-btn google" id="auth-google">
                    <span class="auth-icon">🔍</span>
                    <span>Continue with Google</span>
                </button>
            </div>

            <!-- Or -->
            <div class="auth-or">
                <div class="auth-divider">
                    <span>OR</span>
                </div>
            </div>

            <!-- Player ID Section -->
            <div class="player-id-section">
                <h3>🎮 Enter Your Player ID</h3>
                <p style="color: #6a6a80; font-size: 0.9rem; margin-bottom: 1rem;">
                    Skip registration and directly view your stats using your OpenFront.io Player ID
                </p>
                <input 
                    type="text" 
                    class="player-id-input" 
                    id="guest-player-id" 
                    placeholder="Enter your Player ID (e.g., UWetOwlW)..."
                >
                <button class="player-id-submit" onclick="guestSetPlayerID()">
                    Load My Profile
                </button>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p>
                    By signing in, you agree to our <a href="/terms">Terms of Service</a> and 
                    <a href="/privacy">Privacy Policy</a>
                </p>
                <p style="margin-top: 1rem; font-size: 0.85rem;">
                    Don't have an account? <a href="/signup">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script>
        function guestSetPlayerID() {
            const playerID = document.getElementById('guest-player-id').value.trim();
            if (playerID) {
                // Store as guest without full auth
                let guest = {
                    name: playerID,
                    playerID: playerID,
                    isGuest: true,
                };
                localStorage.setItem('currentUser', JSON.stringify(guest));
                window.location.href = '/profile';
            } else {
                alert('Please enter a valid Player ID');
            }
        }

        // Allow Enter key
        document.getElementById('guest-player-id')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                guestSetPlayerID();
            }
        });
    </script>
</body>
</html>
