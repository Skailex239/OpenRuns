<!DOCTYPE html>
<html>
<head><title>Create PRISM Code</title></head>
<body>
<h3>Création du code OR-PRISM...</h3>
<pre id="log"></pre>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, query, collection, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const log = document.getElementById("log");
function msg(t) { log.textContent += t + "\n"; }

const firebaseConfig = {
  apiKey: "AIzaSyCaJnNR5WOKY9tHg6X9IWpcQcBKHJpvTrk",
  authDomain: "openfront-speedrun.firebaseapp.com",
  projectId: "openfront-speedrun",
  storageBucket: "openfront-speedrun.firebasestorage.app",
  messagingSenderId: "710681441859",
  appId: "1:710681441859:web:a01003e5b07c83ea50c6f6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    msg("Tu n'es pas connecté ! Ouvre d'abord OpenRuns, connecte-toi, puis recharge cette page.");
    return;
  }
  msg("Connecté en tant que : " + user.email);

  try {
    const q = query(collection(db, "reward-codes"), where("code", "==", "OR-PRISM"));
    const snap = await getDocs(q);
    if (!snap.empty) {
      msg("Le code OR-PRISM existe déjà ! Doc ID: " + snap.docs[0].id);
      return;
    }
    msg("Le code n'existe pas encore, création...");
  } catch(e) {
    msg("Erreur vérification: " + e.message);
  }

  try {
    const ref = doc(collection(db, "reward-codes"));
    await setDoc(ref, {
      code: "OR-PRISM",
      type: "prism",
      used: false,
      redeemedBy: []
    });
    msg("Code OR-PRISM créé avec succès ! Doc ID: " + ref.id);
    msg("Tu peux maintenant utiliser OR-PRISM dans le casier cosmétique.");
  } catch(e) {
    msg("Erreur création: " + e.message);
  }
});
</script>
</body>
</html>
