<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PRISM Animation Test</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
body { background: #0d0d11; color: white; font-family: sans-serif; padding: 40px; }
h2 { color: #888; margin-top: 30px; }

@keyframes bouge-rgb{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* PRISM - comme dans styles.css */
.rgb-prism{
  display:inline-block !important;
  font-family:'Orbitron',sans-serif !important;
  font-size:48px;
  font-weight:900;
  background:linear-gradient(90deg,#ff0055,#ff6600,#ffdd00,#00ff88,#00ccff,#6644ff,#cc00ff,#ff0055,#00ff88,#ffdd00) !important;
  background-size:300% auto !important;
  -webkit-background-clip:text !important;
  -webkit-text-fill-color:transparent !important;
  background-clip:text !important;
  color:transparent !important;
  animation:bouge-rgb 2.5s linear infinite !important;
}

/* CHROMA - pour comparaison (celui qui marche) */
.rgb-chroma{
  display:inline-block !important;
  font-family:'Montserrat',sans-serif !important;
  font-size:48px;
  font-weight:900;
  background:linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#00aaff,#8800ff,#ff0088,#ff0000) !important;
  background-size:200% auto !important;
  -webkit-background-clip:text !important;
  -webkit-text-fill-color:transparent !important;
  background-clip:text !important;
  color:transparent !important;
  animation:bouge-rgb 4s linear infinite !important;
}

/* Sans !important pour tester */
.test-prism-no-important{
  display:inline-block;
  font-family:'Orbitron',sans-serif;
  font-size:48px;
  font-weight:900;
  background:linear-gradient(90deg,#ff0055,#ff6600,#ffdd00,#00ff88,#00ccff,#6644ff,#cc00ff,#ff0055,#00ff88,#ffdd00);
  background-size:300% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  color:transparent;
  animation:bouge-rgb 2.5s linear infinite;
}
</style>
</head>
<body>
<h2>PRISM (avec !important)</h2>
<div class="rgb-prism">PRISM SKIN TEST</div>

<h2>CHROMA (comparaison - celui qui marche)</h2>
<div class="rgb-chroma">CHROMA SKIN TEST</div>

<h2>PRISM (sans !important)</h2>
<div class="test-prism-no-important">PRISM NO IMPORTANT</div>
</body>
</html>
